services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reservations}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reservations}
      POSTGRES_DB: ${POSTGRES_DB:-reservations}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reservations}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-reservations}:${POSTGRES_PASSWORD:-reservations}@postgres:5432/${POSTGRES_DB:-reservations}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        node_modules/.bin/prisma migrate deploy &&
        node dist/main
      "

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles:
      - debug

volumes:
  postgres_data:
